name: Deploy Resume App to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the build automatically whenever you commit to main

permissions:
  contents: write # Grants permission to push the built bundle to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build React Application
        run: npm run build
        env:
          CI: false
          PUBLIC_URL: /resume-builder

      - name: Configure SPA Routing Fallback
        run: cp dist/index.html dist/404.html || cp build/index.html build/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Keeps 'dist' for Vite. Change to 'build' if using Create React App.
          branch: gh-pages
          clean: true
